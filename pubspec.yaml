name: second_brain
description: Tu segundo cerebro digital

publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  uuid: ^4.2.1
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^8.1.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  flutter_animate: ^4.5.2
  flutter_slidable: ^4.0.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  sentry_flutter: ^8.12.0
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21